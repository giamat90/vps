name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install demucs librosa soundfile numpy yt-dlp pyinstaller

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: |
          pyinstaller main.py \
            --onefile \
            --name vps-sidecar-aarch64-apple-darwin \
            --hidden-import=demucs \
            --hidden-import=demucs.api \
            --hidden-import=demucs.pretrained \
            --hidden-import=librosa \
            --hidden-import=soundfile \
            --hidden-import=numpy \
            --collect-data=demucs \
            --collect-all=yt_dlp \
            --noconfirm \
            --clean

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          cp sidecar/dist/vps-sidecar-aarch64-apple-darwin src-tauri/binaries/

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (.dmg + .app) ─────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          # Code signing (optional — omit if distributing outside Mac App Store)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test .dmg
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Mounting: $DMG"
          hdiutil attach "$DMG" -mountpoint /tmp/vps-dmg -nobrowse -quiet
          APP=$(find /tmp/vps-dmg -name "*.app" -maxdepth 1 | head -1)
          BINARY=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -1)
          echo "Launching binary: $BINARY"
          "$BINARY" &
          APP_PID=$!
          sleep 15
          if kill -0 $APP_PID 2>/dev/null; then
            echo "App is running (PID $APP_PID) — smoke test passed"
            kill $APP_PID
            wait $APP_PID 2>/dev/null || true
          else
            echo "App exited immediately — smoke test failed"
            hdiutil detach /tmp/vps-dmg -quiet || true
            exit 1
          fi
          hdiutil detach /tmp/vps-dmg -quiet || true

      # ── 11. Publish to GitHub Release (create or update) ─────────────────
      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VPS ${{ github.ref_name }}
          body: See CHANGELOG for details.
          draft: false
          files: src-tauri/target/release/bundle/dmg/*.dmg
