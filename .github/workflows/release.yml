name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install demucs librosa soundfile numpy yt-dlp pyinstaller

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        shell: bash
        run: |
          pyinstaller main.py \
            --onefile \
            --name vps-sidecar-x86_64-pc-windows-msvc \
            --hidden-import=demucs \
            --hidden-import=demucs.api \
            --hidden-import=demucs.pretrained \
            --hidden-import=librosa \
            --hidden-import=soundfile \
            --hidden-import=numpy \
            --collect-data=demucs \
            --collect-all=yt_dlp \
            --noconfirm \
            --clean

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item sidecar/dist/vps-sidecar-x86_64-pc-windows-msvc.exe src-tauri/binaries/

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (NSIS installer) and publish to the release ─
      - name: Build Tauri app (NSIS) and publish
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VPS ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: --bundles nsis

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test
        shell: pwsh
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Host "NSIS installer not found — build may have failed"
            exit 1
          }
          Write-Host "NSIS installer built: $($installer.Name)"

          $binary = "src-tauri/target/release/app.exe"
          Write-Host "Launching: $binary"
          $proc = Start-Process -FilePath $binary -PassThru
          Start-Sleep 15
          if (-not $proc.HasExited) {
            Write-Host "App is running (PID $($proc.Id)) — smoke test passed"
            $proc.Kill()
          } else {
            Write-Host "App exited immediately (exit code $($proc.ExitCode)) — smoke test failed"
            exit 1
          }

  build-macos:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install demucs librosa soundfile numpy yt-dlp pyinstaller

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: |
          pyinstaller main.py \
            --onefile \
            --name vps-sidecar-aarch64-apple-darwin \
            --hidden-import=demucs \
            --hidden-import=demucs.api \
            --hidden-import=demucs.pretrained \
            --hidden-import=librosa \
            --hidden-import=soundfile \
            --hidden-import=numpy \
            --collect-data=demucs \
            --collect-all=yt_dlp \
            --noconfirm \
            --clean

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          cp sidecar/dist/vps-sidecar-aarch64-apple-darwin src-tauri/binaries/

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (.dmg + .app) and publish to the release ──
      - name: Build Tauri app and publish
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Code signing (optional — omit if distributing outside Mac App Store)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VPS ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test .dmg
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Mounting: $DMG"
          hdiutil attach "$DMG" -mountpoint /tmp/vps-dmg -nobrowse -quiet
          APP=$(find /tmp/vps-dmg -name "*.app" -maxdepth 1 | head -1)
          BINARY=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -1)
          echo "Launching binary: $BINARY"
          "$BINARY" &
          APP_PID=$!
          sleep 15
          if kill -0 $APP_PID 2>/dev/null; then
            echo "App is running (PID $APP_PID) — smoke test passed"
            kill $APP_PID
            wait $APP_PID 2>/dev/null || true
          else
            echo "App exited immediately — smoke test failed"
            hdiutil detach /tmp/vps-dmg -quiet || true
            exit 1
          fi
          hdiutil detach /tmp/vps-dmg -quiet || true

      # ── 10b. Gatekeeper smoke test ──────────────────────────────────────
      # The check above launches the raw binary directly, which never goes
      # through Gatekeeper — it can pass even when a real user's download
      # would refuse to open. This reproduces the actual user path: a
      # quarantined .dmg opened via `open` (same launch path as Finder).
      - name: Gatekeeper smoke test (simulates a real download + double-click)
        # Non-blocking: the app is currently unsigned/un-notarized, so this is
        # expected to report a Gatekeeper rejection on every run until we
        # codesign + notarize with an Apple Developer ID. It's here to make
        # that failure visible in CI logs rather than only from testers.
        continue-on-error: true
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          QDMG=/tmp/vps-dmg-quarantined.dmg
          cp "$DMG" "$QDMG"
          # Tag it the way Safari/Chrome tag a browser download.
          xattr -w com.apple.quarantine "0081;00000000;Safari;" "$QDMG"

          echo "--- hdiutil attach (quarantined) ---"
          hdiutil attach "$QDMG" -mountpoint /tmp/vps-dmg-q -nobrowse -quiet
          APP=$(find /tmp/vps-dmg-q -name "*.app" -maxdepth 1 | head -1)
          echo "App: $APP"

          echo "--- codesign -dv --verbose=4 ---"
          codesign -dv --verbose=4 "$APP" || echo "(no valid signature)"

          echo "--- spctl --assess --type execute -v (Gatekeeper verdict) ---"
          set +e
          spctl --assess --type execute -v "$APP"
          SPCTL_STATUS=$?
          set -e
          if [ $SPCTL_STATUS -ne 0 ]; then
            echo "GATEKEEPER WOULD BLOCK THIS APP (spctl exit $SPCTL_STATUS)."
            echo "This is what a tester sees on first double-click of a downloaded build."
            echo "Fix: codesign + notarize with an Apple Developer ID, or document the bypass for testers."
          else
            echo "Gatekeeper accepts this app."
          fi

          hdiutil detach /tmp/vps-dmg-q -quiet || true
          exit $SPCTL_STATUS

      # ── 10c. Package the Gatekeeper-bypass helper for testers ────────────
      # Plain downloads lose the executable bit and get quarantined too, so
      # ship it as a .zip — Archive Utility restores Unix permissions on
      # unzip, unlike a raw .command download.
      - name: Package fix-gatekeeper.command
        run: |
          chmod +x scripts/macos/fix-gatekeeper.command
          cd scripts/macos
          zip -X fix-gatekeeper-macos.zip fix-gatekeeper.command

      # ── 11. Upload the Gatekeeper-bypass helper ──────────────────────────
      # This file isn't a Tauri bundle artifact, so tauri-action doesn't know
      # about it — add it to the (still-draft) release tauri-action just
      # created/reused. draft:true here is required so this step doesn't
      # publish the release before the other platform's job finishes.
      - name: Upload Gatekeeper helper to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'VPS ${{ github.ref_name }}'
          body: See CHANGELOG for details.
          draft: true
          files: scripts/macos/fix-gatekeeper-macos.zip

  finalize:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (undraft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
