name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      # Reads sidecar/requirements.txt as the single source of truth (it
      # pins torch<2.6 — demucs 4.0.1 calls torch.load() without
      # weights_only=False, which torch>=2.6 broke by flipping that default,
      # so an unpinned "latest" torch here breaks model loading entirely).
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── 5b. Vendor a static ffmpeg (Demucs shells out to `ffmpeg`/`ffprobe`
      #        on PATH to decode every input format; bundling it makes the
      #        installed app work without the end user having either on
      #        their system PATH) ────────────────────────────────────────
      - name: Cache static ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: sidecar/vendor/ffmpeg
          key: ffmpeg-x86_64-pc-windows-msvc-v1

      - name: Download static ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        working-directory: sidecar
        shell: pwsh
        run: |
          $dest = "vendor/ffmpeg/x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force $dest | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-lgpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extracted
          $exe = Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName "$dest/ffmpeg.exe"
          $probe = Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $probe.FullName "$dest/ffprobe.exe"
          $license = Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter "LICENSE*" | Select-Object -First 1
          if ($license) { Copy-Item $license.FullName "$dest/ffmpeg-LICENSE.txt" }
          Remove-Item ffmpeg.zip, ffmpeg-extracted -Recurse -Force

      # ── 5c. Vendor the default-quality Demucs model weights (htdemucs) so
      #        the installed app doesn't need internet access on first use —
      #        same self-contained requirement as ffmpeg above. htdemucs_ft
      #        (high_quality option) is not bundled and still downloads on
      #        demand for that opt-in path.
      - name: Cache Demucs model weights
        id: cache-demucs-models
        uses: actions/cache@v4
        with:
          path: sidecar/vendor/demucs-models
          key: demucs-models-v1

      - name: Fetch Demucs model weights
        if: steps.cache-demucs-models.outputs.cache-hit != 'true'
        working-directory: sidecar
        run: python fetch_models.py

      # ── 5d. Stage third-party license notices into the app bundle ────────
      - name: Stage third-party notices
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/resources/third-party-notices | Out-Null
          $license = "sidecar/vendor/ffmpeg/x86_64-pc-windows-msvc/ffmpeg-LICENSE.txt"
          if (Test-Path $license) {
            Copy-Item $license src-tauri/resources/third-party-notices/ffmpeg-LICENSE.txt
          }
          Copy-Item THIRD-PARTY-NOTICES.md src-tauri/resources/third-party-notices/

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      # Delegates to build.py (single source of truth for PyInstaller args)
      # instead of duplicating the flag list here — a duplicated flag list
      # in Song Practice Studio's release.yml (this project's sibling/fork)
      # is exactly how a missing ffprobe binary slipped through a release.
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: python build.py

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          Copy-Item sidecar/dist/vps-sidecar-x86_64-pc-windows-msvc.exe src-tauri/binaries/

      # ── 7b. Smoke-test the frozen sidecar end-to-end (catches missing
      #        native libs / DLLs — e.g. ffmpeg, ffprobe, torch — that a
      #        plain "does it launch" check would miss) ────────────────────
      - name: Smoke test sidecar binary
        shell: pwsh
        run: python sidecar/smoke_test.py src-tauri/binaries/vps-sidecar-x86_64-pc-windows-msvc.exe

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (NSIS installer) and publish to the release ─
      - name: Build Tauri app (NSIS) and publish
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VPS ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: --bundles nsis

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test
        shell: pwsh
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Host "NSIS installer not found — build may have failed"
            exit 1
          }
          Write-Host "NSIS installer built: $($installer.Name)"

          $binary = "src-tauri/target/release/app.exe"
          Write-Host "Launching: $binary"
          $proc = Start-Process -FilePath $binary -PassThru
          Start-Sleep 15
          if (-not $proc.HasExited) {
            Write-Host "App is running (PID $($proc.Id)) — smoke test passed"
            $proc.Kill()
          } else {
            Write-Host "App exited immediately (exit code $($proc.ExitCode)) — smoke test failed"
            exit 1
          }

  build-macos:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1b. Sync version from git tag into all manifest files ────────────
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Stamping version $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # ── 3. Rust ──────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Python ────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. Install Python sidecar dependencies ────────────────────────────
      # Reads sidecar/requirements.txt as the single source of truth (it
      # pins torch<2.6 — demucs 4.0.1 calls torch.load() without
      # weights_only=False, which torch>=2.6 broke by flipping that default,
      # so an unpinned "latest" torch here breaks model loading entirely).
      - name: Install Python dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── 5b. Vendor a static ffmpeg (Demucs shells out to `ffmpeg`/`ffprobe`
      #        on PATH to decode every input format; bundling it makes the
      #        installed app work without the end user having either on
      #        their system PATH) ────────────────────────────────────────
      - name: Cache static ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: sidecar/vendor/ffmpeg
          key: ffmpeg-aarch64-apple-darwin-v1

      - name: Download static ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        working-directory: sidecar
        run: |
          dest="vendor/ffmpeg/aarch64-apple-darwin"
          mkdir -p "$dest"
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg.zip
          unzip -o ffmpeg.zip -d ffmpeg-extracted
          cp ffmpeg-extracted/ffmpeg "$dest/ffmpeg"
          chmod +x "$dest/ffmpeg"
          rm -rf ffmpeg.zip ffmpeg-extracted
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -o ffprobe.zip -d ffprobe-extracted
          cp ffprobe-extracted/ffprobe "$dest/ffprobe"
          chmod +x "$dest/ffprobe"
          rm -rf ffprobe.zip ffprobe-extracted

      # ── 5c. Vendor the default-quality Demucs model weights (htdemucs) so
      #        the installed app doesn't need internet access on first use —
      #        same self-contained requirement as ffmpeg above. htdemucs_ft
      #        (high_quality option) is not bundled and still downloads on
      #        demand for that opt-in path.
      - name: Cache Demucs model weights
        id: cache-demucs-models
        uses: actions/cache@v4
        with:
          path: sidecar/vendor/demucs-models
          key: demucs-models-v1

      - name: Fetch Demucs model weights
        if: steps.cache-demucs-models.outputs.cache-hit != 'true'
        working-directory: sidecar
        run: python3 fetch_models.py

      # ── 5d. Stage third-party license notices into the app bundle ────────
      - name: Stage third-party notices
        run: |
          mkdir -p src-tauri/resources/third-party-notices
          cp THIRD-PARTY-NOTICES.md src-tauri/resources/third-party-notices/

      # ── 6. Freeze the Python sidecar with PyInstaller ────────────────────
      # Delegates to build.py (single source of truth for PyInstaller args)
      # instead of duplicating the flag list here — a duplicated flag list
      # in Song Practice Studio's release.yml (this project's sibling/fork)
      # is exactly how a missing ffprobe binary slipped through a release.
      - name: Build Python sidecar (PyInstaller)
        working-directory: sidecar
        run: python3 build.py

      # ── 7. Stage sidecar binary ───────────────────────────────────────────
      - name: Stage sidecar binary
        run: |
          mkdir -p src-tauri/binaries
          cp sidecar/dist/vps-sidecar-aarch64-apple-darwin src-tauri/binaries/

      # ── 7b. Smoke-test the frozen sidecar end-to-end (catches missing
      #        native libs / DLLs — e.g. ffmpeg, ffprobe, torch — that a
      #        plain "does it launch" check would miss) ────────────────────
      - name: Smoke test sidecar binary
        run: python3 sidecar/smoke_test.py src-tauri/binaries/vps-sidecar-aarch64-apple-darwin

      # ── 8. Install Node dependencies ──────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 9. Build the Tauri app (.dmg + .app) and publish to the release ──
      - name: Build Tauri app and publish
        uses: tauri-apps/tauri-action@v0
        env:
          CARGO_HTTP_MULTIPLEXING: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Code signing (optional — omit if distributing outside Mac App Store)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VPS ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG for details.'
          releaseDraft: true
          prerelease: false

      # ── 10. Smoke test ────────────────────────────────────────────────────
      - name: Smoke test .dmg
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Mounting: $DMG"
          hdiutil attach "$DMG" -mountpoint /tmp/vps-dmg -nobrowse -quiet
          APP=$(find /tmp/vps-dmg -name "*.app" -maxdepth 1 | head -1)
          BINARY=$(find "$APP/Contents/MacOS" -maxdepth 1 -type f | head -1)
          echo "Launching binary: $BINARY"
          "$BINARY" &
          APP_PID=$!
          sleep 15
          if kill -0 $APP_PID 2>/dev/null; then
            echo "App is running (PID $APP_PID) — smoke test passed"
            kill $APP_PID
            wait $APP_PID 2>/dev/null || true
          else
            echo "App exited immediately — smoke test failed"
            hdiutil detach /tmp/vps-dmg -quiet || true
            exit 1
          fi
          hdiutil detach /tmp/vps-dmg -quiet || true

      # ── 10b. Gatekeeper smoke test ──────────────────────────────────────
      # The check above launches the raw binary directly, which never goes
      # through Gatekeeper — it can pass even when a real user's download
      # would refuse to open. This reproduces the actual user path: a
      # quarantined .dmg opened via `open` (same launch path as Finder).
      - name: Gatekeeper smoke test (simulates a real download + double-click)
        # Non-blocking: the app is currently unsigned/un-notarized, so this is
        # expected to report a Gatekeeper rejection on every run until we
        # codesign + notarize with an Apple Developer ID. It's here to make
        # that failure visible in CI logs rather than only from testers.
        continue-on-error: true
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          QDMG=/tmp/vps-dmg-quarantined.dmg
          cp "$DMG" "$QDMG"
          # Tag it the way Safari/Chrome tag a browser download.
          xattr -w com.apple.quarantine "0081;00000000;Safari;" "$QDMG"

          echo "--- hdiutil attach (quarantined) ---"
          hdiutil attach "$QDMG" -mountpoint /tmp/vps-dmg-q -nobrowse -quiet
          APP=$(find /tmp/vps-dmg-q -name "*.app" -maxdepth 1 | head -1)
          echo "App: $APP"

          echo "--- codesign -dv --verbose=4 ---"
          codesign -dv --verbose=4 "$APP" || echo "(no valid signature)"

          echo "--- spctl --assess --type execute -v (Gatekeeper verdict) ---"
          set +e
          spctl --assess --type execute -v "$APP"
          SPCTL_STATUS=$?
          set -e
          if [ $SPCTL_STATUS -ne 0 ]; then
            echo "GATEKEEPER WOULD BLOCK THIS APP (spctl exit $SPCTL_STATUS)."
            echo "This is what a tester sees on first double-click of a downloaded build."
            echo "Fix: codesign + notarize with an Apple Developer ID, or document the bypass for testers."
          else
            echo "Gatekeeper accepts this app."
          fi

          hdiutil detach /tmp/vps-dmg-q -quiet || true
          exit $SPCTL_STATUS

      # ── 10c. Package the Gatekeeper-bypass helper for testers ────────────
      # Plain downloads lose the executable bit and get quarantined too, so
      # ship it as a .zip — Archive Utility restores Unix permissions on
      # unzip, unlike a raw .command download.
      - name: Package fix-gatekeeper.command
        run: |
          chmod +x scripts/macos/fix-gatekeeper.command
          cd scripts/macos
          zip -X fix-gatekeeper-macos.zip fix-gatekeeper.command

      # ── 11. Upload the Gatekeeper-bypass helper ──────────────────────────
      # This file isn't a Tauri bundle artifact, so tauri-action doesn't know
      # about it — add it to the (still-draft) release tauri-action just
      # created/reused. draft:true here is required so this step doesn't
      # publish the release before the other platform's job finishes.
      - name: Upload Gatekeeper helper to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'VPS ${{ github.ref_name }}'
          body: See CHANGELOG for details.
          draft: true
          files: scripts/macos/fix-gatekeeper-macos.zip

  finalize:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (undraft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
